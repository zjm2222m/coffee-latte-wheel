<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>咖啡拉花转盘</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="wheel-stage" aria-labelledby="app-title">
        <div class="title-row">
          <div>
            <p class="eyebrow">Latte Art Wheel</p>
            <h1 id="app-title">咖啡拉花转盘</h1>
          </div>
          <div class="title-actions">
            <button class="manage-button" id="backendToggle" type="button" aria-controls="backendPanel" aria-expanded="false">后台管理</button>
            <button class="icon-button" id="shuffleButton" type="button" aria-label="随机高亮一个咖啡拉花">
              <span aria-hidden="true">↻</span>
            </button>
          </div>
        </div>

        <div class="wheel-wrap">
          <div class="pointer" aria-hidden="true"></div>
          <div class="wheel" id="wheel" aria-label="8 个咖啡拉花选项转盘"></div>
          <button class="spin-button" id="spinButton" type="button">
            <span aria-hidden="true">↻</span>
            <span>转一下</span>
          </button>
        </div>

        <div class="result-panel" aria-live="polite">
          <span class="result-kicker">Try this</span>
          <strong id="resultName">先转一下</strong>
        </div>
      </section>

      <aside class="control-panel" id="backendPanel" aria-labelledby="upload-title" aria-hidden="true">
        <div class="panel-header">
          <div>
            <p class="eyebrow">Backend</p>
            <h2 id="upload-title">后台管理</h2>
          </div>
          <button class="icon-button close-button" id="backendClose" type="button" aria-label="关闭后台管理">×</button>
        </div>

        <div class="api-note">
          <span>可修改每个咖啡拉花的名称，并上传对应图片。</span>
        </div>

        <div class="slot-list" id="slotList"></div>
      </aside>
    </main>

    <div class="crop-modal" id="imageCropper" aria-hidden="true">
      <div class="crop-backdrop" data-crop-close></div>
      <section class="crop-dialog" role="dialog" aria-modal="true" aria-labelledby="cropTitle" aria-describedby="cropHint">
        <div class="crop-header">
          <div>
            <p class="eyebrow">Image Fit</p>
            <h2 id="cropTitle">调整图片</h2>
          </div>
          <button class="icon-button" id="cropClose" type="button" aria-label="取消调整图片">×</button>
        </div>

        <p class="crop-hint" id="cropHint">拖动图片对准圆圈，使用滑杆调整大小。</p>

        <div class="crop-preview-frame">
          <canvas id="cropCanvas" class="crop-canvas" tabindex="0" aria-label="图片裁剪预览"></canvas>
        </div>

        <label class="crop-range-label" for="cropZoom">
          <span>图片大小</span>
          <input id="cropZoom" type="range" min="1" max="4" step="0.01" value="1">
        </label>

        <div class="crop-actions">
          <button class="save-button secondary-button" id="cropReset" type="button">居中</button>
          <button class="save-button secondary-button" id="cropCancel" type="button">取消</button>
          <button class="save-button" id="cropSave" type="button">保存图片</button>
        </div>
      </section>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
